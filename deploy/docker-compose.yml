services:
  notifyhub:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: notifyhub
    restart: unless-stopped
    ports:
      - "${PORT:-9527}:9527"
    volumes:
      - ${DB_PATH:-notifyhub-data}:/app/data
    environment:
      - PORT=9527
      - HOST=0.0.0.0
      - DATA_DIR=/app/data
      - JWT_SECRET=${JWT_SECRET:-}
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9527/api/health"]
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3

volumes:
  notifyhub-data:
