version: '3.8'

services:
  notifyhub:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: notifyhub
    restart: unless-stopped
    ports:
      # Only expose frontend port (backend API is served on the same port)
      - "${PORT:-3000}:3000"
    volumes:
      # Database storage path
      - ${DB_PATH:-notifyhub-data}:/app/data
      # Logs storage path
      - ${LOG_PATH:-notifyhub-logs}:/app/logs
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DATABASE_URL=/app/data/notify-hub.db
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin123}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-admin@notifyhub.local}
      - JWT_SECRET=${JWT_SECRET:-}
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3

volumes:
  notifyhub-data:
  notifyhub-logs:
