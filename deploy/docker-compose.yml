services:
  # ── Nginx: single public-facing port ──
  nginx:
    build:
      context: .
      dockerfile: Dockerfile.nginx
    image: notifyhub-frontend
    container_name: notifyhub-nginx
    restart: unless-stopped
    ports:
      - "${NGINX_PORT:-80}:80"
    depends_on:
      backend:
        condition: service_healthy
    volumes:
      - ./frontend-dist:/usr/share/nginx/html:ro

  # ── Backend: Rust server (internal only) ──
  backend:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    image: notifyhub-backend
    container_name: notifyhub-backend
    restart: unless-stopped
    expose:
      - "9527"
    volumes:
      - ${DB_PATH:-notifyhub-data}:/app/data
    environment:
      - PORT=9527
      - HOST=0.0.0.0
      - DATA_DIR=/app/data
      - JWT_SECRET=${JWT_SECRET:-}
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9527/api/health"]
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3

volumes:
  notifyhub-data:
