server {
    listen 80;
    server_name _;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 256;

    # Frontend static files (served directly by nginx)
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;

        # Cache static assets
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
        }
    }

    # WebSocket proxy for /api/user/push/ws (must be before /api/ catch-all)
    location /api/user/push/ws {
        proxy_pass http://backend:9527;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket timeouts
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # Backend API proxy
    location /api/ {
        proxy_pass http://backend:9527;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts for long-polling / slow requests
        proxy_connect_timeout 60s;
        proxy_read_timeout 120s;
        proxy_send_timeout 60s;
    }

    # Uploaded files proxy
    location /uploads/ {
        proxy_pass http://backend:9527;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;

        # Cache uploaded files
        expires 7d;
        add_header Cache-Control "public";
    }

    # Health check endpoint (nginx-level)
    location /nginx-health {
        return 200 'ok';
        add_header Content-Type text/plain;
    }
}
