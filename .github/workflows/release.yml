name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  # ─────────────────────────────────────────────
  # 1. Docs → GitHub Pages
  # ─────────────────────────────────────────────
  deploy-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        working-directory: docs
        run: npm install

      - name: Build docs
        working-directory: docs
        env:
          SITE_URL: https://xuranus.github.io
          BASE_URL: /notify-hub/
        run: npm run build

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: docs/build

  # ─────────────────────────────────────────────
  # 2. Tauri Desktop — Linux amd64
  # ─────────────────────────────────────────────
  build-linux-amd64:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: desktop

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2" --locked

      - name: Install frontend dependencies
        working-directory: desktop/ui
        run: npm install

      - name: Build
        working-directory: desktop
        run: cargo tauri build --bundles appimage --verbose

      - name: Strip bundled GPU libs from AppImage
        run: |
          APPIMAGE=$(find desktop/target/release/bundle/appimage -name "*.AppImage" | head -1)
          cd /tmp
          "$APPIMAGE" --appimage-extract
          find squashfs-root -name "libwayland-*.so*" -delete
          find squashfs-root -name "libEGL.so*" -delete
          find squashfs-root -name "libGL.so*" -delete
          # Repackage using appimagetool
          wget -q "https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage" -O /tmp/appimagetool
          chmod +x /tmp/appimagetool
          ARCH=x86_64 /tmp/appimagetool squashfs-root "$APPIMAGE"

      - name: Rename artifact
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          APPIMAGE=$(find desktop/target/release/bundle/appimage -name "*.AppImage" | head -1)
          cp "$APPIMAGE" "NotifyHub-Desktop_${VERSION}_linux-amd64.AppImage"

      - uses: actions/upload-artifact@v4
        with:
          name: linux-amd64
          path: NotifyHub-Desktop_*_linux-amd64.AppImage

  # ─────────────────────────────────────────────
  # 3. Tauri Desktop — Linux aarch64
  # ─────────────────────────────────────────────
  build-linux-aarch64:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: desktop

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2" --locked

      - name: Install frontend dependencies
        working-directory: desktop/ui
        run: npm install

      - name: Build
        working-directory: desktop
        run: cargo tauri build --bundles appimage --verbose

      - name: Strip bundled GPU libs from AppImage
        run: |
          APPIMAGE=$(find desktop/target/release/bundle/appimage -name "*.AppImage" | head -1)
          cd /tmp
          "$APPIMAGE" --appimage-extract
          find squashfs-root -name "libwayland-*.so*" -delete
          find squashfs-root -name "libEGL.so*" -delete
          find squashfs-root -name "libGL.so*" -delete
          wget -q "https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-aarch64.AppImage" -O /tmp/appimagetool
          chmod +x /tmp/appimagetool
          ARCH=aarch64 /tmp/appimagetool squashfs-root "$APPIMAGE"

      - name: Rename artifact
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          APPIMAGE=$(find desktop/target/release/bundle/appimage -name "*.AppImage" | head -1)
          cp "$APPIMAGE" "NotifyHub-Desktop_${VERSION}_linux-aarch64.AppImage"

      - uses: actions/upload-artifact@v4
        with:
          name: linux-aarch64
          path: NotifyHub-Desktop_*_linux-aarch64.AppImage

  # ─────────────────────────────────────────────
  # 4. Tauri Desktop — macOS arm64
  # ─────────────────────────────────────────────
  build-macos-arm64:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: desktop

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2" --locked

      - name: Install frontend dependencies
        working-directory: desktop/ui
        run: npm install

      - name: Build
        working-directory: desktop
        run: cargo tauri build --bundles dmg --verbose

      - name: Rename artifact
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          DMG=$(find desktop/target/release/bundle/dmg -name "*.dmg" | head -1)
          cp "$DMG" "NotifyHub-Desktop_${VERSION}_macos-arm64.dmg"

      - uses: actions/upload-artifact@v4
        with:
          name: macos-arm64
          path: NotifyHub-Desktop_*_macos-arm64.dmg

  # ─────────────────────────────────────────────
  # 5. Tauri Desktop — Windows amd64
  # ─────────────────────────────────────────────
  build-windows-amd64:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: desktop

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2"

      - name: Install frontend dependencies
        working-directory: desktop/ui
        run: npm install

      - name: Build
        working-directory: desktop
        shell: bash
        run: |
          set -o pipefail
          cargo tauri build --bundles msi 2>&1 | tee ../windows-build.log

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: windows-build-log
          path: windows-build.log

      - name: Rename artifact
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          MSI=$(find desktop/target/release/bundle/msi -name "*.msi" | head -1)
          echo "Found MSI: $MSI"
          cp "$MSI" "NotifyHub-Desktop_${VERSION}_windows-amd64.msi"

      - uses: actions/upload-artifact@v4
        with:
          name: windows-amd64
          path: NotifyHub-Desktop_*_windows-amd64.msi

  # ─────────────────────────────────────────────
  # 6. Android APK
  # ─────────────────────────────────────────────
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build APK
        working-directory: android
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME || '/usr/local/lib/android/sdk' }}
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx2g"
        run: |
          chmod +x ./gradlew
          ./gradlew clean assembleDebug --stacktrace --no-build-cache

      - name: Rename artifact
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          APK=$(find android/app/build/outputs/apk/debug -name "*.apk" | head -1)
          cp "$APK" "NotifyHub-Android_${VERSION}.apk"

      - uses: actions/upload-artifact@v4
        with:
          name: android
          path: NotifyHub-Android_*.apk

  # ─────────────────────────────────────────────
  # 7. Create GitHub Release
  # ─────────────────────────────────────────────
  release:
    needs:
      - deploy-docs
      - build-linux-amd64
      - build-linux-aarch64
      - build-macos-arm64
      - build-windows-amd64
      - build-android
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: artifacts

      - name: List release assets
        run: ls -la artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
          files: |
            artifacts/NotifyHub-Desktop_*_linux-amd64.AppImage
            artifacts/NotifyHub-Desktop_*_linux-aarch64.AppImage
            artifacts/NotifyHub-Desktop_*_macos-arm64.dmg
            artifacts/NotifyHub-Desktop_*_windows-amd64.msi
            artifacts/NotifyHub-Android_*.apk
